spring:
  application:
    name: piedade-api
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://piedade_user:piedade_pass@localhost:27017/piedade_db?authSource=admin}
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8888}

jwt:
  secret: ${JWT_SECRET:minha-chave-secreta-super-segura-para-jwt-piedade-ccb-2024-com-pelo-menos-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
